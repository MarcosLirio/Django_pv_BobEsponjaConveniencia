{% load static %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar Senha</title>
    <link rel="stylesheet" href="{% static 'conveniencia_App/assets/bootstrap/css/bootstrap.min.css' %}">
    <script src="{% static 'conveniencia_App/assets/default/js/jquery-3.6.0.min.js' %}"></script>
    <script src="{% static 'conveniencia_App/assets/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-header text-center">
                        <h4 class="mb-0">Alterar Senha</h4>
                    </div>
                    <div class="card-body">
                        <form id="change-password-page-form">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">Usuário ou e-mail</label>
                                <input type="text" class="form-control" name="identifier" value="{{ identifier }}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Senha atual ou temporária</label>
                                <input type="password" class="form-control" name="current_password" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Nova senha</label>
                                <input type="password" class="form-control" name="new_password" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Confirmar nova senha</label>
                                <input type="password" class="form-control" name="confirm_password" required>
                            </div>
                            <div class="change-pass-msg"></div>
                            <button type="submit" class="btn btn-primary w-100">Salvar nova senha</button>
                        </form>
                        <div class="text-center mt-3">
                            <a href="{% url 'login' %}">Voltar para login</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        $(function() {
            $('#change-password-page-form').submit(function(e) {
                e.preventDefault();
                var _this = $(this)
                $('.change-pass-msg').remove();
                var el = $('<div>')
                el.addClass("alert alert-info change-pass-msg mt-2")
                el.hide()
                $.ajax({
                    headers: {
                        "X-CSRFToken": '{{csrf_token}}'
                    },
                    url: "{% url 'change-password-login' %}",
                    data: new FormData($(this)[0]),
                    cache: false,
                    contentType: false,
                    processData: false,
                    method: 'POST',
                    type: 'POST',
                    dataType: 'json',
                    success: function(resp) {
                        if (!!resp.msg) {
                            el.removeClass('alert-danger alert-info').addClass(resp.status === 'success' ? 'alert alert-success change-pass-msg mt-2' : 'alert alert-danger change-pass-msg mt-2')
                            el.text(resp.msg)
                            _this.prepend(el)
                            el.show('slow')
                        }
                    },
                    error: function() {
                        el.removeClass('alert-info').addClass('alert-danger')
                        el.text('Ocorreu um erro.')
                        _this.prepend(el)
                        el.show('slow')
                    }
                })
            })
        })
    </script>
</body>
</html>
