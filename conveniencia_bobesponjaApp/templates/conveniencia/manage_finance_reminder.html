<div class="container-fluid">
    <style>
        .modal-headline { background: #f6f6ff; border-left: 3px solid #586994; padding: .55rem .65rem; margin-bottom: .75rem; font-size: .82rem; }
    </style>
    <form id="reminder-form">
        <div class="modal-headline">Lembretes para receber, pagar ou organizar tarefas</div>
        <input type="hidden" name="id" value="{% if reminder.pk %}{{ reminder.pk }}{% endif %}">
        <div class="form-group mb-2">
            <label for="title">Título</label>
            <input type="text" name="title" id="title" class="form-control form-control-sm rounded-0" value="{% if reminder.title %}{{ reminder.title }}{% endif %}" required>
        </div>
        <div class="form-group mb-2">
            <label for="reminder_type">Tipo</label>
            <select name="reminder_type" id="reminder_type" class="form-select form-select-sm rounded-0">
                <option value="RECEBER" {% if reminder.reminder_type == 'RECEBER' or not reminder.pk %}selected{% endif %}>Contas a Receber</option>
                <option value="PAGAR" {% if reminder.reminder_type == 'PAGAR' %}selected{% endif %}>Contas a Pagar</option>
                <option value="GERAL" {% if reminder.reminder_type == 'GERAL' %}selected{% endif %}>Geral</option>
            </select>
        </div>
        <div class="form-group mb-2">
            <label for="customer_id">Cliente</label>
            <select name="customer_id" id="customer_id" class="form-select form-select-sm rounded-0">
                <option value="">Sem cliente</option>
                {% for c in customers %}
                <option value="{{ c.id }}" {% if reminder.customer_id == c.id %}selected{% endif %}>{{ c.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="row g-2">
            <div class="col-md-6 form-group mb-2">
                <label for="amount">Valor</label>
                <input type="number" min="0" step="0.01" name="amount" id="amount" class="form-control form-control-sm rounded-0" value="{% if reminder.amount %}{{ reminder.amount }}{% endif %}">
            </div>
            <div class="col-md-6 form-group mb-2">
                <label for="due_date">Vencimento</label>
                <input type="date" name="due_date" id="due_date" class="form-control form-control-sm rounded-0" value="{% if reminder.due_date %}{{ reminder.due_date|date:'Y-m-d' }}{% endif %}">
            </div>
        </div>
        <div class="form-group mb-2">
            <label for="status">Status</label>
            <select name="status" id="status" class="form-select form-select-sm rounded-0">
                <option value="PENDENTE" {% if reminder.status == 'PENDENTE' or not reminder.pk %}selected{% endif %}>Pendente</option>
                <option value="CONCLUIDO" {% if reminder.status == 'CONCLUIDO' %}selected{% endif %}>Concluído</option>
                <option value="CANCELADO" {% if reminder.status == 'CANCELADO' %}selected{% endif %}>Cancelado</option>
            </select>
        </div>
        <div class="form-group mb-2">
            <label for="details">Detalhes</label>
            <textarea name="details" id="details" rows="3" class="form-control form-control-sm rounded-0">{% if reminder.details %}{{ reminder.details }}{% endif %}</textarea>
        </div>
    </form>
</div>
<script>
$(function(){
    $('#reminder-form').submit(function(e){
        e.preventDefault()
        var _this=$(this)
        start_loader()
        $.ajax({ headers:{'X-CSRFToken':'{{csrf_token}}'}, url:'{% url "save-finance-reminder-page" %}', data:new FormData(_this[0]), cache:false, contentType:false, processData:false, method:'POST', dataType:'json', success:function(resp){ if(resp.status==='success'){location.reload()} else { alert(resp.msg || 'Erro ao salvar lembrete.'); end_loader()} }, error:function(){end_loader()} })
    })
})
</script>
