{% load humanize %}
<div class="container-fluid">
    <form action="" id="checkout-form">
        <div class="form-group mb-3">
            <label for="payable_amount" class="control-label">Valor a Pagar</label>
            <input type="text" id="payable_amount" class="form-control form-control-lg rounded-0 text-end" value="{{ grand_total|intcomma }}" required disabled>
        </div>
        <div class="form-group mb-3">
            <label for="tendered_amount" class="control-label">Valor Pago</label>
            <input type="text" id="tendered_amount" class="form-control form-control-lg rounded-0 text-end" value="R$ 0,00" inputmode="decimal" required>
        </div>
        <div class="form-group mb-3">
            <label for="payment_change" class="control-label">Troco</label>
            <input type="text" id="payment_change" class="form-control form-control-lg rounded-0 text-end" value="{{ 0|intcomma }}" required disabled>
        </div>
    </form>
</div>
<script>
    $(function() {
        function formatBRL(value) {
            return Number(value || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })
        }

        function parseBRL(value) {
            var cleaned = String(value || '').replace(/[^\d,.-]/g, '').trim()
            if (cleaned === '') {
                return 0
            }
            if (cleaned.indexOf(',') >= 0) {
                cleaned = cleaned.replace(/\./g, '').replace(',', '.')
            }
            var parsed = parseFloat(cleaned)
            return isNaN(parsed) ? 0 : parsed
        }

        $('#payable_amount').val(formatBRL(parseBRL($('#payable_amount').val())))
        $('#payment_change').val(formatBRL(0))
        $('#tendered_amount').val(formatBRL(0))

        $('#tendered_amount').on('focus', function() {
            $(this).val(parseBRL($(this).val()).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }))
            $(this).select()
        })

        $('#tendered_amount').on('input keypress keyup keydown', function() {
            var tendered_amount = $('#tendered_amount').val()
            var payable = $('#payable_amount').val()
            tendered_amount = parseBRL(tendered_amount)
            payable = parseBRL(payable)
            var change = 0
            tendered_amount = tendered_amount > 0 ? tendered_amount : 0;
            $('[name="tendered_amount"]').val(tendered_amount)
            change = parseFloat(tendered_amount) - parseFloat(payable)
            $('#payment_change').val(formatBRL(change))
            $('[name="amount_change"]').val(change)

        })
        $('#tendered_amount').on('blur', function() {
            $(this).val(formatBRL(parseBRL($(this).val())))
        })
        $('#checkout-form').submit(function(e) {
            e.preventDefault();
            if ($('[name="amount_change"]').val() < 0) {
                alert("O valor pago é menor que o valor a pagar")
                return false;
            }
            $('#pos-form').submit()
        })
    })
</script>
